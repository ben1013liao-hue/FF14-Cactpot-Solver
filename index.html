<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 仙人微彩計算器 - v3</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: '微軟正黑體', 'Noto Sans TC', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff; 
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 { 
            color: #d4af37; 
            text-shadow: 2px 2px 4px #000; 
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 20px;
        }
        .main-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* --- 左側：遊戲區域 --- */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- 右側：資訊區域 (Payout + 預覽) --- */
        .right-area {
            display: flex;
            flex-direction: column;
            width: 380px; 
            padding-top: 55px; /* 對齊操作指引 */
            gap: 20px;
        }

        /* 步驟指示器 */
        .step-indicator {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: #3a3a5c;
            border: 2px solid #555;
            transition: all 0.3s;
        }
        .step.active {
            background: linear-gradient(135deg, #d4af37 0%, #aa8a2a 100%);
            color: #000;
            border-color: #d4af37;
            transform: scale(1.1);
        }
        .step.done {
            background: linear-gradient(135deg, #4a9f4a 0%, #2d7a2d 100%);
            border-color: #4a9f4a;
        }

        /* 操作指引 */
        .instruction-panel {
            width: 100%;
            max-width: 380px;
            background: #2a2a4a; 
            border: 1px solid #444;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: left;
            min-height: 100px;
        }
        .instruction-header {
            color: #d4af37;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .instruction-content {
            color: #ccc;
            font-size: 15px;
            line-height: 1.6;
        }
        .text-highlight {
            color: #7fff7f;
            font-weight: bold;
        }
        
        /* 九宮格與結果的容器 */
        .grid-container {
            display: grid;
            grid-template-columns: 65px repeat(3, 75px) 65px;
            grid-template-rows: 45px repeat(3, 75px);
            gap: 5px;
            align-items: center;
            justify-items: center;
        }
        
        /* 格子樣式 */
        .cell {
            width: 70px;
            height: 70px;
            font-size: 26px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3a3a5c;
            color: #fff;
            border: 3px solid #555;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .cell:hover:not(.revealed):not(.disabled) { 
            border-color: #d4af37; 
            background: #4a4a6c;
        }
        .cell.revealed {
            background: linear-gradient(135deg, #2d5a8a 0%, #1a3a5a 100%);
            border-color: #4a9fdf;
            cursor: default;
        }
        .cell.revealed.initial {
            background: linear-gradient(135deg, #8a5a2d 0%, #5a3a1a 100%);
            border-color: #df9f4a;
        }
        .cell.recommended {
            border-color: #7fff7f !important;
            box-shadow: 0 0 15px #4a9f4a, inset 0 0 10px rgba(74, 159, 74, 0.3);
            animation: pulse 1.5s infinite;
        }
        .cell.disabled { opacity: 0.5; cursor: not-allowed; }
        .cell .cell-ev {
            position: absolute; bottom: 2px; right: 4px; font-size: 10px; color: #aaa;
        }
        .cell.recommended .cell-ev { color: #7fff7f; font-weight: bold; }
        
        /* 最佳路線高亮動畫 */
        .cell.best-line-cell {
            border-color: #ff4444 !important;
            box-shadow: 0 0 20px #ff4444, inset 0 0 25px rgba(255, 68, 68, 0.4) !important;
            animation: cellPulse 1s infinite !important;
            position: relative;
        }
        .cell.best-line-cell::before {
            content: ""; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 3px solid #ff4444; border-radius: 14px; animation: cellPulse 1s infinite;
        }
        @keyframes cellPulse {
            0%, 100% { box-shadow: 0 0 20px #ff4444, inset 0 0 25px rgba(255, 68, 68, 0.4); border-color: #ff4444; }
            50% { box-shadow: 0 0 35px #ff6666, inset 0 0 35px rgba(255, 100, 100, 0.5); border-color: #ff6666; }
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px #4a9f4a, inset 0 0 10px rgba(74, 159, 74, 0.3); }
            50% { box-shadow: 0 0 25px #7fff7f, inset 0 0 15px rgba(127, 255, 127, 0.4); }
        }
        
        .result-cell, .diag-result {
            font-size: 13px; font-weight: bold; padding: 6px 8px; border-radius: 5px;
            background: #2a2a4a; min-width: 60px; text-align: center;
            transition: all 0.3s ease; position: relative; cursor: help;
        }
        .diag-result { font-size: 12px; }
        .result-cell.best, .diag-result.best {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            box-shadow: 0 0 15px #ff4444, 0 0 30px #ff0000;
            transform: scale(1.1); border: 2px solid #fff; animation: bestPulse 1s infinite;
        }
        @keyframes bestPulse {
            0%, 100% { box-shadow: 0 0 15px #ff4444, 0 0 30px #ff0000; }
            50% { box-shadow: 0 0 25px #ff6666, 0 0 50px #ff4444; }
        }
        .ev { color: #ffd700; }
        
        .buttons { display: flex; gap: 8px; margin-top: 12px; }
        button {
            font-size: 14px; padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer;
            font-weight: bold; transition: transform 0.1s;
        }
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.98); }
        .btn-reset { background: #555; color: #fff; }
        .btn-undo { background: #8a5a2d; color: #fff; }

        .legend-container {
            display: flex; justify-content: center; gap: 25px; margin-top: 15px; padding: 10px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #fff; }
        .legend-box { width: 20px; height: 20px; border-radius: 6px; background: transparent; border: 2px solid #555; }
        .legend-box.initial { border-color: #df9f4a; background: rgba(223, 159, 74, 0.2); }
        .legend-box.revealed { border-color: #4a9fdf; background: rgba(74, 159, 223, 0.2); }
        .legend-box.recommended { border-color: #7fff7f; box-shadow: 0 0 5px #4a9f4a; background: rgba(74, 159, 74, 0.2); }

        /* --- Payout 表 (雙欄) --- */
        .payout-panel {
            background: #2a2a4a;
            border-radius: 10px;
            padding: 10px 15px;
            border: 1px solid #444;
        }
        .payout-panel h3 {
            color: #d4af37;
            margin: 0 0 10px 0;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            font-size: 16px;
        }
        #payout-list {
            display: flex;
            gap: 20px;
        }
        .payout-col {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 5px;
        }
        .payout-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid #333;
            font-size: 13px;
        }
        .payout-sum { width: 25px; text-align: center; font-weight: bold; color: #aaa; }
        .payout-sum.highlight-6 { color: #ff6b6b; }
        .payout-sum.highlight-24 { color: #ffd93d; }
        .payout-input {
            width: 60px; padding: 2px; font-size: 13px; text-align: right;
            background: #3a3a5c; color: #fff; border: 1px solid #555; border-radius: 4px;
        }
        .payout-label { color: #888; font-size: 10px; margin-left: 2px; }
        .btn-reset-payout {
            width: 100%; margin-top: 10px; padding: 6px; font-size: 12px;
            background: #444; color: #aaa; border-radius: 4px;
        }

        /* --- 左側：單一最佳選擇 Banner (無衝突時顯示) --- */
        .best-choice-banner {
            margin-top: 15px;
            padding: 12px 15px;
            background: linear-gradient(135deg, #2a2a4a 0%, #1a1a3a 100%);
            border-radius: 10px;
            border: 2px solid #ff4444;
            box-shadow: 0 5px 15px rgba(255, 68, 68, 0.2);
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 380px;
        }
        
        .banner-header {
            display: flex; align-items: center; justify-content: space-between;
            padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .banner-left { display: flex; align-items: center; gap: 12px; }
        .banner-icon { font-size: 28px; }
        .banner-title { font-size: 11px; color: #888; margin-bottom: 2px; }
        .banner-line { font-size: 16px; font-weight: bold; color: #fff; }
        .banner-right { text-align: right; }
        .banner-ev-label { font-size: 11px; color: #888; margin-bottom: 2px; }
        .banner-ev-value { font-size: 20px; font-weight: bold; color: #ffd700; }
        .banner-ev-unit { font-size: 12px; color: #ffd700; }
        
        .banner-probs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .prob-tag {
            padding: 6px; background: rgba(255, 255, 255, 0.08); border-radius: 6px;
            font-size: 12px; color: #ccc; border: 1px solid #444; text-align: center;
        }
        .prob-tag .prob-mgp { color: #ffd700; font-weight: bold; display: block; }
        .prob-tag .prob-percent { color: #888; font-size: 10px; }
        .prob-tag.high-value { background: rgba(255, 215, 0, 0.15); border-color: #aa8a2a; }
        .prob-tag.jackpot { background: rgba(255, 68, 68, 0.2); border-color: #ff4444; animation: jackpotGlow 1.5s infinite; }
        @keyframes jackpotGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 68, 68, 0.5); }
            50% { box-shadow: 0 0 12px rgba(255, 68, 68, 0.8); }
        }

        /* --- 左側：VS 對決面板 (有衝突時顯示) --- */
        .vs-container {
            margin-top: 15px;
            width: 100%;
            min-width: 380px;
            display: flex;
            gap: 10px;
        }
        
        .vs-card {
            flex: 1;
            background: #2a2a4a;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }
        .vs-card.risky {
            background: linear-gradient(180deg, rgba(255,68,68,0.1) 0%, rgba(20,20,30,0) 100%);
            border: 1px solid #ff4444;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.1);
        }
        .vs-card.safe {
            background: linear-gradient(180deg, rgba(74,159,223,0.1) 0%, rgba(20,20,30,0) 100%);
            border: 1px solid #4a9fdf;
            box-shadow: 0 0 10px rgba(74, 159, 223, 0.1);
        }

        .vs-icon { font-size: 24px; margin-bottom: 5px; }
        .vs-title { font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .vs-card.risky .vs-title { color: #ff6666; }
        .vs-card.safe .vs-title { color: #4a9fdf; }
        
        .vs-line-name { font-size: 13px; font-weight: bold; margin-bottom: 5px; min-height: 38px; display:flex; align-items:center; justify-content:center;}
        
        .vs-value-box { margin-bottom: 8px; }
        .vs-label { font-size: 10px; color: #888; }
        .vs-value { font-size: 18px; font-weight: bold; }
        .vs-value.gold { color: #ffd700; }
        .vs-value.blue { color: #4a9fdf; }
        .vs-unit { font-size: 10px; color: #aaa; }

        .vs-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80px;
            padding-top: 20px;
        }
        .vs-badge {
            font-size: 14px;
            font-weight: bold;
            background: #fff;
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .win-rate-label { font-size: 10px; color: #ccc; margin-bottom: 2px; }
        .win-rate-val { font-size: 20px; font-weight: bold; color: #7fff7f; text-shadow: 0 0 5px rgba(127,255,127,0.3); }
        .win-rate-desc { font-size: 10px; color: #888; margin-top: 2px; }

        .vs-probs {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: auto;
        }
        .vs-prob-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            padding: 2px 4px;
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
        }
        .vs-prob-val { color: #ffd700; }
        .vs-prob-pct { color: #aaa; }

        /* --- 右側：預覽面板 (獨立顯示區) --- */
        .preview-banner {
            padding: 12px 15px;
            background: linear-gradient(135deg, #333 0%, #222 100%);
            border: 1px solid #555;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 380px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            /* 改由 JS 控制是否顯示，預設隱藏 */
        }
        .preview-banner .banner-title { color: #bbb; }
        .preview-banner .banner-icon { filter: grayscale(100%); }

        /* Modal */
        .number-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .number-modal.show { display: flex; }
        .number-grid {
            background: #2a2a4a; padding: 25px; border-radius: 15px; border: 2px solid #d4af37; min-width: 220px;
        }
        .number-grid h4 { text-align: center; margin: 0 0 15px 0; color: #d4af37; }
        .number-options { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; }
        .number-btn {
            width: 60px; height: 60px; font-size: 24px; font-weight: bold; border: none; border-radius: 10px;
            cursor: pointer; background: #4a4a6c; color: #fff; transition: all 0.2s;
        }
        .number-btn:hover:not(:disabled) { background: #d4af37; color: #000; transform: scale(1.1); }
        .number-btn:disabled { background: #333; color: #555; cursor: not-allowed; }
        .cancel-btn {
            grid-column: span 3; width: 100%; height: 45px; font-size: 16px; background: #555;
            margin-top: 10px; color: #fff; border:none; border-radius:5px; cursor:pointer;
        }

        /* 語系選擇器 */
        .lang-selector {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
        }
        .lang-select {
            padding: 8px 12px;
            font-size: 14px;
            border: 2px solid #d4af37;
            border-radius: 8px;
            background: #2a2a4a;
            color: #fff;
            cursor: pointer;
            outline: none;
        }
        .lang-select:hover {
            background: #3a3a5c;
        }
        .lang-select option {
            background: #2a2a4a;
            color: #fff;
        }
/* --- 新增：左側導覽列樣式 --- */
        .nav-sidebar {
            display: flex;
            flex-direction: column;
            width: 200px; /* 固定寬度 */
            gap: 15px;    /* 按鈕間距 */
            padding-top: 55px; /* 與右側資訊區對齊高度 */
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background-color: #2a2a4a;
            color: #ccc;
            text-decoration: none; /* 去除底線 */
            border-radius: 10px;
            border: 1px solid #444;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .nav-item:hover {
            background-color: #3a3a5c;
            border-color: #d4af37;
            color: #fff;
            transform: translateX(5px); /* 滑鼠移上去微動特效 */
        }

        .nav-item.active {
            background: linear-gradient(135deg, #d4af37 0%, #aa8a2a 100%);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .nav-icon {
            font-size: 20px;
            margin-right: 10px;
            width: 24px;
            text-align: center;
        }

        /* 手機版響應式調整 */
        @media (max-width: 900px) {
            .nav-sidebar {
                width: 100%; /* 手機版變全寬 */
                flex-direction: row; /* 變成橫向排列 */
                padding-top: 0;
                margin-bottom: 20px;
                justify-content: center;
            }
            .nav-item {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>

            <option value="ko">한국어</option>

        </select>
    </div>

<h1 id="main-title">🌵 仙人微彩計算器 - v3</h1>
    <p class="subtitle" id="main-subtitle">點擊格子輸入數字，系統會自動推薦最佳揭露順序</p>

<div class="nav-sidebar">

                <div class="cell" id="c8" onclick="clickCell(8)"></div>
                <div></div>
            </div>

            <div class="best-choice-banner" id="best-choice-banner" style="display:none;">
                <div class="banner-header">
                    <div class="banner-left">
                        <div class="banner-icon" id="banner-icon">🎯</div>
                        <div class="banner-title-section">
                            <div class="banner-title" id="banner-title-text">最佳選擇 (完美)</div>
                            <div class="banner-line" id="banner-line-name">-</div>

                    </div>
                    <div class="banner-right">
                        <div class="banner-ev-label" id="banner-ev-label">平均期望值</div>

                    <span class="payout-sum ${highlight}">${sum}</span>
                    <input type="number" class="payout-input" id="payout-${sum}" 
                           value="${payouts[sum]}" onchange="updatePayout(${sum})">
                    <span class="payout-label">MGP</span>
                </div>`;
        }

        // Hover 事件邏輯優化
        function initHoverEvents() {
            lines.forEach(line => {
                const el = document.getElementById(line.id);
                el.addEventListener('mouseenter', () => {
                    if (currentStep < 4 || latestLineStats.length === 0) return;
                    const lineData = latestLineStats.find(l => l.id === line.id);
                    // 滑鼠移入時，強制顯示該線路資訊，並標示為「預覽中」
                    if (lineData) showPreview(lineData, true);
                });
                el.addEventListener('mouseleave', () => {
                    // 滑鼠移出時，回復到顯示「最佳路線」
                    if (currentStep >= 4) resetPreviewToBest();
                });
            });
        }

        // 顯示預覽視窗內容
        function showPreview(lineData, isHovering) {
            const previewBanner = document.getElementById('preview-banner');
            previewBanner.style.display = 'flex';
            
            const titleEl = document.getElementById('preview-title');
            if (isHovering) {
                titleEl.textContent = "選擇預覽 (滑鼠指引)";
                titleEl.style.color = "#aaa"; // 灰色表示只是預覽
            } else {
                titleEl.textContent = "最佳選擇 (系統推薦)";
                titleEl.style.color = "#ffd700"; // 金色表示推薦
            }
            
            document.getElementById('preview-line-name').textContent = lineData.name;
            document.getElementById('preview-ev-value').textContent = Math.round(lineData.ev).toLocaleString();
            
            updateProbabilityDisplay(lineData, 'preview-probs');
        }

        // 重置預覽視窗內容為最佳路線
        function resetPreviewToBest() {
            if (!latestLineStats.length) return;
            const maxEV = Math.max(...latestLineStats.map(l => l.ev));
            const bestLines = latestLineStats.filter(l => l.ev === maxEV);
            // 顯示第一條最佳路線 (通常只有一條，若有多條則顯示第一條)
            showPreview(bestLines[0], false);
        }

        function hidePreview() {
            document.getElementById('preview-banner').style.display = 'none';
        }

        function clickCell(cellIndex) {
            if (board[cellIndex] !== null) return;
            if (currentStep >= 4) return;
            selectedCell = cellIndex;
            showNumberModal();
        }

        function showNumberModal() {
            const modal = document.getElementById('number-modal');
            const options = document.getElementById('number-options');
            const usedNumbers = new Set(board.filter(n => n !== null));
            let html = '';
            for (let n = 1; n <= 9; n++) {
                const disabled = usedNumbers.has(n) ? 'disabled' : '';
                html += `<button class="number-btn" ${disabled} onclick="selectNumber(${n})">${n}</button>`;
            }
            html += `<button class="number-btn cancel-btn" onclick="hideNumberModal()">${i18n[currentLang].modalCancel}</button>`;
            options.innerHTML = html;
            modal.classList.add('show');
        }

        function hideNumberModal() {
            document.getElementById('number-modal').classList.remove('show');
            selectedCell = null;
        }

        function selectNumber(num) {
            if (selectedCell === null) return;
            board[selectedCell] = num;
            revealOrder.push({ cell: selectedCell, value: num, isInitial: currentStep === 0 });
            currentStep = Math.min(currentStep + 1, 4);
            hideNumberModal();
            updateDisplay();
        }

        function undoLast() {
            if (revealOrder.length === 0) return;
            const last = revealOrder.pop();
            board[last.cell] = null;
            currentStep = Math.max(0, currentStep - 1);
            updateDisplay();
        }

        function resetGame() {
            board = Array(9).fill(null);
            revealOrder = [];
            currentStep = 0;
            latestLineStats = [];
            document.getElementById('best-choice-banner').style.display = 'none';
            document.getElementById('vs-container').style.display = 'none';
            document.getElementById('preview-banner').style.display = 'none';
            for (let i = 0; i < 9; i++) {
                document.getElementById('c' + i).classList.remove('best-line-cell');
            }
            updateDisplay();
        }

        function updateDisplay() {
            for (let i = 0; i < 9; i++) {
                const cell = document.getElementById('c' + i);
                cell.textContent = board[i] !== null ? board[i] : '';
                cell.className = 'cell';
                if (board[i] !== null) {
                    cell.classList.add('revealed');
                    const order = revealOrder.find(r => r.cell === i);
                    if (order && order.isInitial) cell.classList.add('initial');
                }
            }

            for (let i = 0; i <= 4; i++) {
                const step = document.getElementById('step' + i);
                step.className = 'step';
                if (i < currentStep) step.classList.add('done');
                if (i === currentStep) step.classList.add('active');
            }

            if (currentStep >= 1 && currentStep < 4) calculateBestReveal();
            else clearRecommendations();

            calculateLineEV();
            updateInstructions();
        }

        function updateInstructions() {
            const textField = document.getElementById('instruction-text');
            textField.innerHTML = i18n[currentLang].instructions[currentStep] || '';
        }

        function calculateBestReveal() {
            const unrevealedCells = [];
            for (let i = 0; i < 9; i++) { if (board[i] === null) unrevealedCells.push(i); }
            if (unrevealedCells.length === 0) return;

            const usedNumbers = new Set(board.filter(n => n !== null));
            const availableNumbers = [];
            for (let n = 1; n <= 9; n++) { if (!usedNumbers.has(n)) availableNumbers.push(n); }

            let cellScores = [];
            unrevealedCells.forEach(cellIdx => {
                let totalBestEV = 0;
                availableNumbers.forEach(num => {
                    let tempBoard = [...board];
                    tempBoard[cellIdx] = num;
                    const bestLineEV = calculateBestLineEV(tempBoard, availableNumbers.filter(n => n !== num));
                    totalBestEV += bestLineEV;
                });
                cellScores.push({ cell: cellIdx, ev: totalBestEV / availableNumbers.length });
            });

            cellScores.sort((a, b) => b.ev - a.ev);
            const bestEV = cellScores[0].ev;
            cellScores.forEach(cs => {
                const cell = document.getElementById('c' + cs.cell);
                if (Math.abs(cs.ev - bestEV) < 0.01) cell.classList.add('recommended');
                let evSpan = cell.querySelector('.cell-ev');
                if (!evSpan) { evSpan = document.createElement('span'); evSpan.className = 'cell-ev'; cell.appendChild(evSpan); }
                evSpan.textContent = Math.round(cs.ev);
            });
        }

        function calculateBestLineEV(tempBoard, remainingNumbers) {
            const emptyIndices = [];
            for (let i = 0; i < 9; i++) { if (tempBoard[i] === null) emptyIndices.push(i); }
            const perms = getPermutations(remainingNumbers);
            if (perms.length === 0) return 0;

            let lineEVs = lines.map(() => 0);
            perms.forEach(perm => {
                let fullBoard = [...tempBoard];
                let pIdx = 0;
                emptyIndices.forEach(i => { fullBoard[i] = perm[pIdx++]; });
                lines.forEach((line, lineIdx) => {
                    const sum = fullBoard[line.idx[0]] + fullBoard[line.idx[1]] + fullBoard[line.idx[2]];
                    lineEVs[lineIdx] += payouts[sum] || 0;
                });
            });
            return Math.max(...lineEVs.map(total => total / perms.length));
        }

        function calculateLineEV() {
            const usedNumbers = new Set(board.filter(n => n !== null));
            const availableNumbers = [];
            for (let n = 1; n <= 9; n++) { if (!usedNumbers.has(n)) availableNumbers.push(n); }
            const emptyIndices = [];
            for (let i = 0; i < 9; i++) { if (board[i] === null) emptyIndices.push(i); }

            const perms = getPermutations(availableNumbers);
            if (perms.length === 0 && emptyIndices.length > 0) return;

            let lineStats = lines.map(line => ({ 
                ...line, totalMGP: 0, count: 0, payoutDist: {}, minMGP: Infinity 
            }));

            if (perms.length === 0) {
                lines.forEach((line, idx) => {
                    const sum = board[line.idx[0]] + board[line.idx[1]] + board[line.idx[2]];
                    const mgp = payouts[sum] || 0;
                    lineStats[idx].totalMGP = mgp;
                    lineStats[idx].count = 1;
                    lineStats[idx].payoutDist[mgp] = 1;
                    lineStats[idx].minMGP = mgp;
                });
            } else {
                perms.forEach(perm => {
                    let fullBoard = [...board];
                    let pIdx = 0;
                    emptyIndices.forEach(i => { fullBoard[i] = perm[pIdx++]; });
                    lineStats.forEach((line, idx) => {
                        const sum = fullBoard[line.idx[0]] + fullBoard[line.idx[1]] + fullBoard[line.idx[2]];
                        const mgp = payouts[sum] || 0;
                        lineStats[idx].totalMGP += mgp;
                        lineStats[idx].count++;
                        lineStats[idx].payoutDist[mgp] = (lineStats[idx].payoutDist[mgp] || 0) + 1;
                        if (mgp < lineStats[idx].minMGP) lineStats[idx].minMGP = mgp;
                    });
                });
            }

            lineStats.forEach(line => { line.ev = line.count > 0 ? line.totalMGP / line.count : 0; });
            latestLineStats = lineStats;
            
            const maxEV = Math.max(...lineStats.map(l => l.ev));
            for (let i = 0; i < 9; i++) document.getElementById('c' + i).classList.remove('best-line-cell');
            
            lineStats.forEach(line => {
                const el = document.getElementById(line.id);
                const evText = Math.round(line.ev);
                if (line.id.includes('diag')) {
                    const arrow = line.id === 'res-diag0' ? '↘' : '↙';
                    el.innerHTML = `${arrow} <span class="ev">${evText}</span>`;
                } else {
                    el.innerHTML = `<span class="ev">${evText}</span>`;
                }
                el.classList.remove('best');
                if (line.ev === maxEV && maxEV > 0 && currentStep >= 4) {
                    el.classList.add('best');
                    line.idx.forEach(cellIdx => document.getElementById('c' + cellIdx).classList.add('best-line-cell'));
                }
            });

            if (currentStep >= 4) {
                updateBestChoiceDisplay();
                // ★★★ 關鍵修改：進入步驟 4 時，自動將預覽框設為最佳解 ★★★
                resetPreviewToBest();
            } else {
                document.getElementById('best-choice-banner').style.display = 'none';
                document.getElementById('vs-container').style.display = 'none';
                document.getElementById('preview-banner').style.display = 'none';
            }
        }

        // 處理顯示邏輯 (單一顯示 或 VS 顯示)
        function updateBestChoiceDisplay() {
            if (!latestLineStats.length) return;

            const maxEV = Math.max(...latestLineStats.map(l => l.ev));
            const bestLines = latestLineStats.filter(l => l.ev === maxEV);
            
            const maxMinMGP = Math.max(...latestLineStats.map(l => l.minMGP));
            const safestLines = latestLineStats.filter(l => l.minMGP === maxMinMGP);
            
            // 如果最佳期望值的保底 < 最高保底，觸發 VS 模式
            if (bestLines[0].minMGP < maxMinMGP) {
                showVSMode(bestLines[0], safestLines[0]);
            } else {
                showSingleMode(bestLines);
            }
        }

        function showSingleMode(linesData) {
            document.getElementById('vs-container').style.display = 'none';
            const banner = document.getElementById('best-choice-banner');
            banner.style.display = 'flex';
            
            document.getElementById('banner-line-name').textContent = linesData.map(l => l.name).join(' / ');
            document.getElementById('banner-ev-value').textContent = Math.round(linesData[0].ev).toLocaleString();
            updateProbabilityDisplay(linesData[0], 'banner-probs');
        }

        function showVSMode(riskyLine, safeLine) {
            document.getElementById('best-choice-banner').style.display = 'none';
            const container = document.getElementById('vs-container');
            container.style.display = 'flex';

            document.getElementById('vs-risky-name').textContent = riskyLine.name;
            document.getElementById('vs-risky-ev').textContent = Math.round(riskyLine.ev).toLocaleString();
            
            document.getElementById('vs-safe-name').textContent = safeLine.name;
            document.getElementById('vs-safe-val').textContent = safeLine.minMGP.toLocaleString();

            const threshold = safeLine.minMGP;
            let winCount = 0;
            const probs = [];
            
            Object.entries(riskyLine.payoutDist).forEach(([mgp, count]) => {
                if (parseInt(mgp) > threshold) winCount += count;
                probs.push({ mgp: parseInt(mgp), count: count, percent: (count/riskyLine.count*100) });
            });
            
            const winRate = (winCount / riskyLine.count) * 100;
            document.getElementById('vs-win-rate').textContent = winRate.toFixed(0) + "%";
            
            const riskLabel = document.getElementById('vs-risk-label');
            const t = i18n[currentLang];
            if (winRate >= 60) {
                riskLabel.textContent = t.riskWorth;
                riskLabel.style.color = "#7fff7f";
            } else if (winRate >= 40) {
                riskLabel.textContent = t.riskMid;
                riskLabel.style.color = "#ffd700";
            } else {
                riskLabel.textContent = t.riskHigh;
                riskLabel.style.color = "#ff6b6b";
            }

            probs.sort((a,b) => b.mgp - a.mgp);
            let html = '';
            probs.slice(0, 3).forEach(p => {
                html += `<div class="vs-prob-row">
                    <span class="vs-prob-val">${p.mgp}</span>
                    <span class="vs-prob-pct">${p.percent.toFixed(0)}%</span>
                </div>`;
            });
            document.getElementById('vs-risky-probs').innerHTML = html;
        }

        function updateProbabilityDisplay(line, containerId) {
            const probsContainer = document.getElementById(containerId);
            if (!line || !line.payoutDist) { probsContainer.innerHTML = ''; return; }
            const probs = Object.entries(line.payoutDist)
                .map(([mgp, count]) => ({ mgp: parseInt(mgp), count: count, percent: (count / line.count * 100).toFixed(1) }))
                .sort((a, b) => b.mgp - a.mgp);
            let html = '';
            probs.forEach(p => {
                let tagClass = 'prob-tag';
                if (p.mgp >= 10000) tagClass += ' jackpot';
                else if (p.mgp >= 1000) tagClass += ' high-value';
                html += `<div class="${tagClass}"><span class="prob-mgp">${p.mgp.toLocaleString()}</span><span class="prob-percent">(${p.percent}%)</span></div>`;
            });
            probsContainer.innerHTML = html;
        }

        function clearRecommendations() {
            for (let i = 0; i < 9; i++) {
                const cell = document.getElementById('c' + i);
                cell.classList.remove('recommended');
                const evSpan = cell.querySelector('.cell-ev');
                if (evSpan) evSpan.remove();
            }
        }

        function updatePayout(sum) {
            payouts[sum] = parseInt(document.getElementById('payout-' + sum).value) || 0;
            updateDisplay();
        }

        function resetPayouts() {
            payouts = { ...defaultPayouts };
            initPayoutList();
            updateDisplay();
        }

        function getPermutations(arr) {
            if (arr.length === 0) return [[]];
            if (arr.length === 1) return [[arr[0]]];
            let result = [];
            for (let i = 0; i < arr.length; i++) {
                const current = arr[i];
                const remaining = [...arr.slice(0, i), ...arr.slice(i + 1)];
                const perms = getPermutations(remaining);
                perms.forEach(perm => result.push([current, ...perm]));
            }
            return result;
        }

        window.onload = init;
    </script>
</body>
